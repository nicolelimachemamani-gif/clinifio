services:
  # ──────────────────────────────────────────────
  # SERVICIO 1: FastAPI — Motor de Inferencia
  # ──────────────────────────────────────────────
  - type: web
    name: clinifio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ──────────────────────────────────────────────
  # SERVICIO 2: Streamlit — Frontend Clínico
  # ──────────────────────────────────────────────
  - type: web
    name: clinifio-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_URL
        value: https://clinifio.onrender.com  # URL pública del API en Render
